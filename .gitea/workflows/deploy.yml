name: Deploy Portfolio

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm ci

      - name: Build static export
        env:
          GITEA_TOKEN: ${{ secrets.README_TOKEN }}
        run: npm run build

      - name: Deploy to server
        run: |
          rm -rf /home/team/shami/out/*
          cp -r out/* /home/team/shami/out/
          docker restart shami
          echo "Portfolio deployed: $(date)"
