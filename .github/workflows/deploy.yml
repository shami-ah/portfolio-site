name: Deploy to Server

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build static export
        run: npm run build

      - name: Package output
        run: tar -czf out.tar.gz -C out .

      - name: Upload to server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: 124.29.215.53
          port: 2202
          username: team
          key: ${{ secrets.SERVER_SSH_KEY }}
          source: out.tar.gz
          target: /home/team/shami/

      - name: Deploy on server
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: 124.29.215.53
          port: 2202
          username: team
          key: ${{ secrets.SERVER_SSH_KEY }}
          script: |
            cd /home/team/shami
            rm -rf out/*
            tar -xzf out.tar.gz -C out/
            rm out.tar.gz
            docker restart shami
            echo "Deploy complete: $(date)"
